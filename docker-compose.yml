services:
  spanish-app:
    build: .
    ports:
      - "8000:3000"
    env_file:
      - .env
    environment:
      - FRONTEND_URL=http://localhost:3000,http://localhost:8000
    volumes:
      # Persist SQLite database across container restarts
      - ./app.db:/usr/src/app/app.db
    restart: unless-stopped
